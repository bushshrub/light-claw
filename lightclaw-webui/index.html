<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>light-claw</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <span class="logo">light-claw</span>
    </div>
    <div class="header-center">
      <button id="thread-btn" class="btn btn-thread" title="Switch thread">
        <span id="thread-label">default</span>
        <span class="thread-caret">▾</span>
      </button>
    </div>
    <div class="header-right">
      <button id="tools-btn" class="btn btn-ghost" title="Registered tools">tools</button>
      <button id="memory-btn" class="btn btn-ghost" title="Memory notes">memory</button>
      <button id="clear-btn" class="btn btn-ghost btn-danger" title="Clear history">clear</button>
    </div>
  </header>

  <main id="messages" class="messages">
    <div class="welcome">
      <div class="welcome-logo">&#x1f9b7; light-claw</div>
      <div class="welcome-sub">local agent OS &mdash; type a message or paste an image</div>
    </div>
  </main>

  <div id="attachment-preview" class="attachment-preview" style="display:none"></div>

  <footer class="input-area">
    <div class="input-row">
      <button id="upload-btn" class="btn btn-icon" title="Attach image (or paste with Ctrl+V)">&#x1f4ce;</button>
      <textarea
        id="input"
        class="input-field"
        placeholder="Message light-claw… (Enter to send, Shift+Enter for newline, Ctrl+V to paste image)"
        rows="1"
      ></textarea>
      <button id="send-btn" class="btn btn-send" title="Send">&#x2192;</button>
    </div>
    <div id="status-bar" class="status-bar">
      <span class="status-idle">ready</span>
    </div>
  </footer>

  <input type="file" id="upload-input" accept="image/*" multiple style="display:none">

  <!-- Thread picker dropdown -->
  <div id="thread-dropdown" class="dropdown" style="display:none">
    <div class="dropdown-header">Threads</div>
    <div id="thread-list" class="thread-list"></div>
    <div class="dropdown-footer">
      <input id="new-thread-input" class="new-thread-input" placeholder="New thread ID…">
      <button id="new-thread-btn" class="btn btn-small">go</button>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal" style="display:none">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <span id="modal-title" class="modal-title"></span>
        <button id="modal-close" class="btn btn-ghost">&#x2715;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
