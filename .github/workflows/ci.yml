name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system .

      - name: Check imports
        run: |
          python -c "
          import lightclaw
          import lightclaw.config
          import lightclaw.agent
          import lightclaw.llm.client
          import lightclaw.memory.workspace
          import lightclaw.tools.registry
          import lightclaw.tools.builtins
          import lightclaw.channels.discord_bot
          import lightclaw.channels.signal_bot
          print('All imports OK')
          "

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install with dev extras
        run: uv pip install --system ".[dev]"

      - name: Type check
        run: pyrefly check lightclaw/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Discord bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/light-claw-discord:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/light-claw-discord:latest

  docker-sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build opencode sandbox image
        uses: docker/build-push-action@v5
        with:
          context: lightclaw-tools/opencode
          file: lightclaw-tools/opencode/Dockerfile.sandbox
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/lightclaw-opencode-sandbox:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/lightclaw-opencode-sandbox:latest
